syntax = "proto3";
package nt8bridge;

service StrategyBrain {
  rpc EvaluateCandle (CandleRequest) returns (ActionResponse) {}
}

message CandleRequest {
    string symbol = 1;
    double open = 2;
    double high = 3;
    double low = 4;
    double close = 5;
    double volume = 6;
    string time = 7;
    double current_position = 8; 
    double current_pnl = 9;
    double vwap_distance = 10;
    double volume_surge = 11;
}

message ActionResponse {
    enum Action {
        HOLD = 0;
        BUY = 1;
        SELL = 2;
        CLOSE_ALL = 3;
    }
    Action action = 1;
    double confidence = 2;
    string message = 3;
}
